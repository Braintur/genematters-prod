{% extends "base.html" %}

{% block title %}HTML Article Guide{% endblock %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/article-style.css') }}">
    <style>
        .guide-container {
            background: white;
            color: #000;
            padding: 60px 40px;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .guide-container h1 {
            color: #22c55e;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        .guide-container h2 {
            color: #7c3aed;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 2rem;
            border-bottom: 2px solid #22c55e;
            padding-bottom: 10px;
        }

        .guide-container h3 {
            color: #000;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .guide-container code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            color: #d9534f;
        }

        .guide-container pre {
            background: #000;
            color: #22c55e;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 15px 0;
            border-left: 4px solid #7c3aed;
        }

        .guide-container pre code {
            color: #22c55e;
            background: none;
            padding: 0;
        }

        .guide-container ol,
        .guide-container ul {
            margin: 15px 0 15px 40px;
        }

        .guide-container li {
            margin-bottom: 10px;
        }

        .guide-container blockquote {
            border-left: 4px solid #22c55e;
            padding-left: 20px;
            margin-left: 0;
            color: #666;
        }

        .guide-content {
            white-space: pre-wrap;
            font-family: inherit;
        }

        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s;
            font-weight: bold;
        }

        .back-button:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }
    </style>
{% endblock %}

{% block header %}
    <div class="placeholder">
        <h1>HTML Article Guide</h1>
    </div>
{% endblock %}

{% block content %}
<div class="content">
    <div class="guide-container">
        <div class="guide-content">{{ content }}</div>
        <a href="{{ url_for('create_article') }}" class="back-button">← Back to Create Article</a>
    </div>
</div>
{% endblock %}
