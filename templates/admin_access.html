<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Access</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/variables.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-sans);
            background: linear-gradient(135deg, #7c3aed 0%, #22c55e 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            position: relative;
            overflow-x: hidden;
        }

        .gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #7c3aed 0%, #22c55e 100%);
            pointer-events: none;
            z-index: 1;
            opacity: 0.9;
        }

        .gradient-blur-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(60px);
            pointer-events: none;
            z-index: 2;
        }

        .admin-container {
            position: relative;
            z-index: 3;
            max-width: 450px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.2);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: var(--font-weight-bold);
            background: linear-gradient(135deg, #22c55e, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            background: linear-gradient(135deg, #22c55e, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: var(--font-size-sm);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(16, 185, 129, 0.6);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        .error-message {
            background: rgba(220, 53, 69, 0.2);
            border-left: 4px solid #dc3545;
            color: #ff6b6b;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .info-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: var(--font-size-xs);
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="gradient"></div>
    <div class="gradient-blur-layer"></div>
    
    <div class="admin-container">
        <h2>Admin Access</h2>
        
        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('admin_access') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password">Access Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter access password">
            </div>

            <button type="submit" class="submit-btn">Access</button>
        </form>

        <div class="info-text">
            <p>This page is not indexed by search engines.</p>
        </div>
    </div>
</body>
</html>
